<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forest Narratives Studio</title>
  <script>
    (function () {
      function preferred() {
        try {
          var stored = localStorage.getItem('fns-site-lang');
          if (stored === 'ru' || stored === 'en') return stored;
        } catch (e) { /* private mode */ }
        var list = navigator.languages || [navigator.language || 'en'];
        for (var i = 0; i < list.length; i++) {
          if (String(list[i]).toLowerCase().startsWith('ru')) return 'ru';
        }
        return 'en';
      }
      var lang = preferred();
      window.__FNS_LANG__ = lang;
      document.documentElement.lang = lang === 'ru' ? 'ru' : 'en';
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #1a1f1a;
      color: #e8ebe8;
    }

    .fns-lang {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.35rem;
      padding: 0.25rem;
      border-radius: 0.65rem;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(232, 235, 232, 0.12);
    }

    .fns-lang button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 2.25rem;
      padding: 0.35rem 0.65rem;
      border: none;
      border-radius: 0.45rem;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .fns-lang-sep {
      align-self: center;
      padding: 0 0.1rem;
      font-size: 0.875rem;
      font-weight: 400;
      color: rgba(232, 235, 232, 0.35);
      user-select: none;
    }

    .fns-lang button:hover {
      background: rgba(232, 235, 232, 0.08);
    }

    .fns-lang button:focus-visible {
      outline: 2px solid #6b9b6b;
      outline-offset: 2px;
    }

    .fns-lang button[aria-pressed="true"] {
      background: rgba(107, 155, 107, 0.22);
      box-shadow: inset 0 0 0 1px rgba(107, 155, 107, 0.45);
    }

    .fns-lang button[aria-pressed="false"] {
      opacity: 0.55;
    }

    .fns-lang button[aria-pressed="false"]:hover {
      opacity: 0.85;
    }

    main {
      text-align: center;
      padding: 1.5rem;
      max-width: 28rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
    }

    p {
      margin: 0;
      line-height: 1.5;
      color: #a8b0a8;
    }
  </style>
</head>
<body>
  <nav class="fns-lang" aria-label="Language">
    <button type="button" id="fns-lang-en" aria-pressed="false" title="English" aria-label="English">English</button>
    <span class="fns-lang-sep" aria-hidden="true">|</span>
    <button type="button" id="fns-lang-ru" aria-pressed="false" title="Русский" aria-label="Русский">Русский</button>
  </nav>

  <main>
    <h1 id="fns-title">Сайт в разработке</h1>
    <p id="fns-lead">Скоро здесь появится контент Forest Narratives Studio.</p>
  </main>

  <script>
    (function () {
      var STR = {
        ru: {
          h1: 'Сайт в разработке',
          p: 'Скоро здесь появится контент Forest Narratives Studio.'
        },
        en: {
          h1: 'Site under construction',
          p: 'Forest Narratives Studio content will appear here soon.'
        }
      };

      var titleEl = document.getElementById('fns-title');
      var leadEl = document.getElementById('fns-lead');
      var btnRu = document.getElementById('fns-lang-ru');
      var btnEn = document.getElementById('fns-lang-en');

      function apply(lang) {
        var t = STR[lang] || STR.en;
        titleEl.textContent = t.h1;
        leadEl.textContent = t.p;
        document.documentElement.lang = lang === 'ru' ? 'ru' : 'en';
        btnRu.setAttribute('aria-pressed', lang === 'ru' ? 'true' : 'false');
        btnEn.setAttribute('aria-pressed', lang === 'en' ? 'true' : 'false');
        window.__FNS_LANG__ = lang;
      }

      apply(window.__FNS_LANG__ || 'en');

      btnRu.addEventListener('click', function () {
        try { localStorage.setItem('fns-site-lang', 'ru'); } catch (e) {}
        apply('ru');
      });

      btnEn.addEventListener('click', function () {
        try { localStorage.setItem('fns-site-lang', 'en'); } catch (e) {}
        apply('en');
      });
    })();
  </script>
</body>
</html>
